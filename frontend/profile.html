<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HackBuddy — Profile</title>
  <link rel="stylesheet" href="/static/profile.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet"
  />
</head>
<body>

  
  <!-- Background sparkles -->
  <div class="blob blob-1">✦</div>
  <div class="blob blob-2">✦</div>
  <div class="blob blob-3">✦</div>
  <div class="blob blob-4">✦</div>
  <div class="blob blob-5">✦</div>

  <!-- Nav -->
  <nav class="navbar">
    <a href="/" class="nav-brand">
      <span class="brand-hack">Hack</span><span class="brand-buddy">Buddy</span>
    </a>
    <a href="/" class="back-btn">← Back</a>
  </nav>

  <!-- Main -->
  <main class="profile-main">

    <!-- Loading state -->
    <div id="loading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading profile…</p>
    </div>

    <!-- Error state -->
    <div id="error" class="error-state hidden">
      <div class="error-icon">⚠️</div>
      <h2>Profile not found</h2>
      <p>This student doesn't exist or was removed.</p>
      <a href="/" class="btn-primary">Go Home</a>
    </div>

    <!-- Profile card -->
    <div id="profile-card" class="profile-card hidden">

      <!-- Header band -->
      <div class="card-header">
        <div class="avatar-ring">
          <img id="profile-avatar" src="" alt="Avatar" class="profile-avatar" />
        </div>
        <div class="header-info">
          <h1 id="profile-name" class="profile-name"></h1>
          <p id="profile-college" class="profile-college"></p>
          <!-- Social links -->
          <div class="social-links" id="social-links">
            <a id="btn-linkedin" href="#" target="_blank" class="social-btn linkedin hidden">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
              </svg>
              LinkedIn
            </a>
            <a id="btn-github" href="#" target="_blank" class="social-btn github hidden">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
              </svg>
              GitHub
            </a>
            <a id="btn-portfolio" href="#" target="_blank" class="social-btn portfolio hidden">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="2" y1="12" x2="22" y2="12"/>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
              </svg>
              Portfolio
            </a>
          </div>
        </div>
      </div>
      <!-- Add this right after </div> of social-links -->
      <a id="edit-profile-btn" href="#" class="edit-profile-btn">✏️ Edit Profile</a>
      <div class="edit-profile-btn-wrap">
      </div>

      <!-- Detail grid -->
      <div class="detail-grid">

        <div class="detail-card">
          <div class="detail-icon">💻</div>
          <div class="detail-content">
            <span class="detail-label">Skills</span>
            <div id="profile-skills" class="tag-list"></div>
          </div>
        </div>

        <div class="detail-card">
          <div class="detail-icon">❤️</div>
          <div class="detail-content">
            <span class="detail-label">Interests</span>
            <div id="profile-interests" class="tag-list"></div>
          </div>
        </div>

        <div class="detail-card wide">
          <div class="detail-icon">🚀</div>
          <div class="detail-content">
            <span class="detail-label">Project Idea</span>
            <p id="profile-project" class="detail-value"></p>
          </div>
        </div>

        <div class="detail-card">
          <div class="detail-icon">🌍</div>
          <div class="detail-content">
            <span class="detail-label">Domain</span>
            <p id="profile-domain" class="detail-value"></p>
          </div>
        </div>

        <div class="detail-card">
          <div class="detail-icon">🔍</div>
          <div class="detail-content">
            <span class="detail-label">Looking For</span>
            <p id="profile-looking" class="detail-value"></p>
          </div>
        </div>

      </div>
    </div>

  </main>

  <script src="/static/profile.js"></script>
</body>
</html>
